version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: synthocore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: synthocore
      POSTGRES_PASSWORD: synthocore
      POSTGRES_DB: synthocore
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U synthocore']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: synthocore_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: .
      dockerfile: packages/core/Dockerfile
    container_name: synthocore_agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://synthocore:synthocore@postgres:5432/synthocore
      REDIS_URL: redis://redis:6379
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
